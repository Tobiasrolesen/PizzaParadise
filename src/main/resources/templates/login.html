<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
<h2>Login</h2>

<form th:action="@{/login}" method="post" th:object="${user}">

    <label>Email</label>
    <input type="email" th:field="*{email}" /><br>

    <label>Password</label>
    <input type="password" th:field="*{password}" /><br>

    <button type="submit">Login</button>

    <p th:if="${error}" th:text="${error}"><
</form>

</body>
</html>
